<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - Story Transition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            image-rendering: pixelated;
        }

        body {
            background-color: #e7e7d7;
            font-family: 'VT323', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            padding-bottom: 50px;
        }

        /* 角色圖片容器 */
        .character-container {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            margin-bottom: -20px;
        }

        .character-img {
            height: 60vh;
            max-width: 90%;
            object-fit: contain;
        }

        /* 對話對話框 */
        .dialogue-box {
            width: 90%;
            background: #fdfcf3;
            border: 4px solid #87a7b7;
            border-style: outset;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .name-tag {
            background: #87a7b7;
            color: white;
            padding: 5px 15px;
            position: absolute;
            top: -25px;
            left: 10px;
            font-size: 24px;
        }

        .dialogue-text {
            font-size: 26px;
            color: #444444;
            min-height: 80px;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .next-btn {
            float: right;
            background: #87a7b7;
            color: white;
            border: none;
            padding: 5px 20px;
            font-family: 'VT323', monospace;
            font-size: 24px;
            cursor: pointer;
        }

        /* 彈出視窗 (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fdfcf3;
            border: 6px solid #b78777;
            padding: 30px;
            width: 85%;
            text-align: center;
            box-shadow: 0 0 0 4px #fdfcf3, 0 0 0 8px #444444;
        }

        /* 道具視覺容器 */
        .item-visual-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .item-img {
            width: 140px;
            height: auto;
            z-index: 10;
            position: relative;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
            animation: itemFloat 2s ease-in-out infinite;
        }

        @keyframes itemFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* 閃光效果 (Sparkles) */
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #ffffff, #ffffaa);
            width: 16px;
            height: 16px;
            clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
            animation: blinkSparkle 0.8s infinite alternate;
            z-index: 15;
            box-shadow: 0 0 8px rgba(255, 255, 200, 0.9);
        }

        .s1 { top: 5%; left: 15%; animation-delay: 0.1s; }
        .s2 { top: 15%; right: 10%; animation-delay: 0.3s; transform: scale(1.3); }
        .s3 { bottom: 15%; left: 10%; animation-delay: 0.5s; transform: scale(1.1); }
        .s4 { bottom: 5%; right: 15%; animation-delay: 0.2s; }
        .s5 { top: 40%; left: -5%; animation-delay: 0.4s; transform: scale(1.5); }
        .s6 { top: 55%; right: -8%; animation-delay: 0.6s; transform: scale(1.4); }
        .s7 { top: 70%; left: 30%; animation-delay: 0.15s; transform: scale(0.9); }
        .s8 { bottom: 40%; right: 25%; animation-delay: 0.45s; transform: scale(1.2); }
        .s9 { top: 10%; right: 30%; animation-delay: 0.7s; transform: scale(1); }
        .s10 { bottom: 10%; left: 35%; animation-delay: 0.35s; transform: scale(1.1); }

        @keyframes blinkSparkle {
            0%, 100% { transform: scale(0.2); opacity: 0; }
            30% { transform: scale(0.8); opacity: 0.6; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0.3; }
        }

        /* 圓形光暈背景 */
        .glow-bg {
            position: absolute;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, 
                rgba(255, 255, 150, 0.8) 0%, 
                rgba(255, 255, 100, 0.5) 30%,
                rgba(255, 200, 50, 0.3) 60%,
                rgba(255, 255, 255, 0) 100%);
            animation: pulseGlow 1.2s infinite ease-in-out;
            z-index: 1;
            border-radius: 50%;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* 旋轉光環 */
        .rotate-ring {
            position: absolute;
            width: 190px;
            height: 190px;
            border: 2px solid rgba(255, 255, 150, 0.7);
            border-radius: 50%;
            animation: rotateRing 3s linear infinite;
            z-index: 2;
            box-shadow: 0 0 15px rgba(255, 255, 150, 0.5);
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .modal-title {
            color: #b78777;
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .modal-body {
            font-size: 22px;
            color: #444444;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .close-btn {
            background: #444444;
            color: white;
            border: none;
            padding: 10px 30px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            cursor: pointer;
        }

        .close-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="character-container">
        <img src="Study_Lion.png" alt="Study Lion" class="character-img">
    </div>

    <div class="dialogue-box">
        <div class="name-tag">溫獅(Study Lion)</div>
        <div class="dialogue-text" id="textDisplay"></div>
        <button class="next-btn" id="nextBtn" onclick="advanceDialogue()">-></button>
    </div>

    <div class="modal" id="rewardModal">
        <div class="modal-content">
            <!-- 道具圖片與閃光效果 -->
            <div class="item-visual-container">
                <div class="glow-bg"></div>
                <div class="rotate-ring"></div>
                
                <div class="sparkle s1"></div>
                <div class="sparkle s2"></div>
                <div class="sparkle s3"></div>
                <div class="sparkle s4"></div>
                <div class="sparkle s5"></div>
                <div class="sparkle s6"></div>
                <div class="sparkle s7"></div>
                <div class="sparkle s8"></div>
                <div class="sparkle s9"></div>
                <div class="sparkle s10"></div>
                
                <img src="bookmark.png" alt="Bookmark" class="item-img">
            </div>
            
            <div class="modal-title">‘Bookmark’ Get!</div>
            <div class="modal-body">
                Looks like an old bookmark…<br>
                溫獅(Study Lion) must had used this for a long time.<br><br>
                Please keep it until the final war with the villain…<br>
                Please move to the next location.
            </div>
            <button class="close-btn" onclick="location.href='index.html'">OK</button>
        </div>
    </div>

    <script>
        const dialogues = [
            "Oh my gosh! I feel so much better right now!! Tell me when you need to study.",
            "Call me! I will get you a seat anytime anywhere!",
            "Peace at last. Knowledge is power. Take this Bookmark."
        ];

        let currentIndex = 0;
        const textDisplay = document.getElementById('textDisplay');
        const nextBtn = document.getElementById('nextBtn');
        const modal = document.getElementById('rewardModal');

        function updateDialogue() {
            textDisplay.textContent = dialogues[currentIndex];
            
            // 最後一段對話時按鈕變成 "Next"
            if (currentIndex === dialogues.length - 1) {
                nextBtn.textContent = "Next";
            } else {
                nextBtn.textContent = "->";
            }
        }

        function advanceDialogue() {
            if (currentIndex < dialogues.length - 1) {
                currentIndex++;
                updateDialogue();
            } else {
                // 顯示彈出視窗
                modal.style.display = "flex";
            }
        }

        // 初始化
        updateDialogue();
    </script>
</body>
</html>
