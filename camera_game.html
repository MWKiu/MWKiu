<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PIXEL MATCH AR! - LIBRARY MISSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'VT323', monospace;
            background: #e7e7d7;
            color: #444444;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .pixel-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(0deg, transparent 24%, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 0, 0, 0.05) 75%, rgba(0, 0, 0, 0.05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 0, 0, 0.05) 75%, rgba(0, 0, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 8px 8px;
            z-index: 10;
            pointer-events: none;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            padding: 20px 10px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .pixel-panel {
            background: #fdfcf3;
            border: 4px solid #87a7b7;
            border-style: outset;
            padding: 10px;
            margin-bottom: 12px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .energy-container { margin-bottom: 15px; }
        .energy-label {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 5px;
            color: #7a8f95;
            font-weight: bold;
        }
        .energy-bar-bg {
            width: 100%;
            height: 16px;
            background: #dcdcd3;
            border: 2px solid #a7a7a7;
            overflow: hidden;
        }
        .energy-fill {
            width: 80%;
            height: 100%;
            background: #b78777;
            transition: width 0.3s steps(5);
        }

        .location-header {
            text-align: center;
            background: #87a7b7;
            color: white;
            border-color: #577787;
        }
        .location-name { font-size: 28px; text-transform: uppercase; }

        .timer {
            font-size: 38px;
            font-weight: 700;
            color: #7a8f95;
            text-align: center;
            margin-bottom: 10px;
        }

        .section-title {
            color: #7a8f95;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            border-left: 5px solid #7a8f95;
            padding-left: 6px;
        }
        
        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #f0f0e3;
            border: 2px solid #a7a7a7;
            border-style: inset;
            overflow: hidden;
            position: relative;
        }
        
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        #video { width: 100%; height: 100%; object-fit: cover; display: none; background: #2a2a2a; }
        
        .camera-placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #2a2a2a; color: #87a7b7;
            z-index: 5;
        }
        
        .camera-placeholder.hidden { display: none; }

        .similarity-meter { margin-top: 8px; background: #f0f4f5; }
        .meter-bar {
            width: 100%; height: 100%; height: 10px;
            background: #dcdcd3; border: 1px solid #a7a7a7;
            overflow: hidden; margin: 5px 0;
        }
        .meter-fill { height: 100%; transition: width 0.2s steps(4); width: 0%; }
        .meter-fill.high { background: #87a7b7; }
        .meter-fill.medium { background: #a7b7c7; }
        .meter-fill.low { background: #b7c7d7; }

        .btn {
            width: 100%; padding: 12px; font-size: 20px;
            border: 4px solid #a7b7c7; border-style: outset;
            background: #a7b7c7; color: white; cursor: pointer;
            font-family: 'VT323', monospace; font-weight: 700;
            text-transform: uppercase; margin-top: 8px;
        }
        .btn:active { border-style: inset; background: #87a7b7; transform: translate(1px, 1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .back-button { position: fixed; top: 15px; left: 10px; z-index: 100; }
        .back-button a {
            color: #7a8f95; text-decoration: none; font-size: 18px;
            background: #fdfcf3; padding: 4px 8px; border: 2px solid #87a7b7;
        }

        .toast {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: #444444; color: white; padding: 8px 16px;
            border: 2px solid #a7a7a7; border-style: outset; z-index: 1000;
            display: none; text-transform: uppercase;
        }
        .toast.show { display: block; animation: pixelFadeIn 0.3s ease; }

        @keyframes pixelFadeIn { from { opacity: 0; bottom: 5px; } to { opacity: 1; bottom: 25px; } }
        
        .debug-status { font-size: 12px; color: #b78777; text-align: center; margin-top: 8px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="pixel-grid"></div>

    <div class="back-button"><a href="index.html">✕ EXIT</a></div>

    <div class="game-container">
        <div class="pixel-panel status-bar">
            <div class="level-info" style="color: #7a8f95;">LIBRARY AREA</div>
            <div class="timer" id="timer" style="margin-bottom: 0;">--:--</div>
        </div>

        <div class="energy-container">
            <div class="energy-label"><span>NEGATIVE ENERGY</span><span id="energyPercent">80%</span></div>
            <div class="energy-bar-bg"><div class="energy-fill" id="energyFill" style="width: 80%"></div></div>
        </div>

        <div class="pixel-panel location-header">
            <div class="location-name">LIBRARY SANCTUARY</div>
            <div class="level-badge" id="levelInfo">LEVEL 1/3 | TIME 5:00</div>
        </div>

        <div class="pixel-panel">
            <div class="section-title">TARGET IMAGE</div>
            <div class="image-container" id="targetContainer">
                <img id="targetImg" src="" alt="TARGET" style="display:none; width:100%; height:100%; object-fit:cover;">
                <div id="targetPlaceholder" style="display: flex; align-items: center; justify-content: center; width:100%; height:100%; color: #a7a7a7;">📖 LOADING...</div>
            </div>
        </div>

        <div class="pixel-panel similarity-meter" id="similarityMeter" style="display:none">
            <div style="font-size: 16px; color: #7a8f95; text-transform: uppercase;">MATCH ANALYSIS</div>
            <div class="meter-bar"><div class="meter-fill" id="similarityFill"></div></div>
            <div id="similarityText" style="text-align:right; font-size: 16px; font-weight: bold;">0%</div>
        </div>

        <div class="pixel-panel">
            <div class="section-title">YOUR CAMERA</div>
            <div class="image-container" style="position: relative;">
                <video id="video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; display: none;"></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div id="cameraPlaceholder" class="camera-placeholder">
                    <span>📷</span>
                    <span>WAITING FOR CAMERA...</span>
                </div>
            </div>
            <div class="photo-actions" style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>📸 TAKE PHOTO</button>
                <button class="btn" id="submitBtn" onclick="submitMatch()" disabled style="background: #b78777; border-color: #b78777;">⬆ SUBMIT</button>
            </div>
            <div id="cameraStatus" class="debug-status">⚡ CAMERA: INITIALIZING...</div>
        </div>

        <button class="btn" id="nextLevelBtn" onclick="nextLevel()" style="display:none; background: #444444; border-color: #444444; margin-bottom: 40px; color: #fdfcf3;">▶ NEXT LEVEL</button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // 設定本地圖片路徑
        const LEVEL_IMAGES = [
            "1-1.png",
            "2-1.png",
            "3-1.png"
        ];
        
        const LEVEL_TIMES = [300, 240, 180];
        const FALLBACK_IMAGE = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2387a7b7'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='white' font-size='14'%3EIMAGE ERROR%3C/text%3E%3C/svg%3E";
        
        let gameState = {
            currentLevel: 1,
            energy: 80,
            timer: 0,
            timerInterval: null,
            cameraActive: false,
            cameraStream: null,
            currentSimilarity: 0,
            isSubmitted: false,
            levelCompleted: false
        };

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const targetImg = document.getElementById('targetImg');
        const targetPlaceholder = document.getElementById('targetPlaceholder');
        const energyFill = document.getElementById('energyFill');
        const energyPercent = document.getElementById('energyPercent');
        const timerDisplay = document.getElementById('timer');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const submitBtn = document.getElementById('submitBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const similarityMeter = document.getElementById('similarityMeter');
        const similarityFill = document.getElementById('similarityFill');
        const similarityText = document.getElementById('similarityText');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');
        const cameraStatus = document.getElementById('cameraStatus');
        const levelInfo = document.getElementById('levelInfo');

        window.onload = () => {
            showToast("PRESS ALLOW FOR CAMERA");
            initCamera();
        };
        
        async function initCamera() {
            try {
                const constraints = { video: { facingMode: 'environment' } };
                gameState.cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = gameState.cameraStream;
                video.style.display = 'block';
                cameraPlaceholder.classList.add('hidden');
                gameState.cameraActive = true;
                takePhotoBtn.disabled = false;
                cameraStatus.textContent = "✅ CAMERA: ONLINE";
                startLevel();
            } catch (error) {
                cameraStatus.textContent = "❌ CAMERA: DEMO MODE";
                gameState.cameraActive = false;
                takePhotoBtn.disabled = false;
                startLevel();
            }
        }
        
        function startLevel() {
            const idx = gameState.currentLevel - 1;
            const timeLimit = LEVEL_TIMES[idx];
            
            targetImg.src = LEVEL_IMAGES[idx];
            targetImg.onload = () => {
                targetImg.style.display = 'block';
                targetPlaceholder.style.display = 'none';
            };
            targetImg.onerror = () => {
                targetImg.src = FALLBACK_IMAGE;
            };
            
            levelInfo.textContent = `LEVEL ${gameState.currentLevel}/3 | TIME ${Math.floor(timeLimit/60)}:00`;
            gameState.isSubmitted = false;
            gameState.levelCompleted = false;
            similarityMeter.style.display = 'none';
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'none';
            takePhotoBtn.textContent = "📸 TAKE PHOTO";
            startTimer(timeLimit);
        }
        
        function startTimer(seconds) {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            gameState.timer = seconds;
            updateTimerDisplay();
            gameState.timerInterval = setInterval(() => {
                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    handleTimeout();
                } else {
                    gameState.timer--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(gameState.timer / 60);
            const secs = gameState.timer % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        
        function handleTimeout() {
            showToast("⏰ TIME'S UP!");
            nextLevelBtn.style.display = 'block';
            nextLevelBtn.textContent = "🔄 RETRY LEVEL";
        }
        
        function takePhoto() {
            if (!gameState.cameraActive) {
                gameState.currentSimilarity = Math.floor(65 + Math.random() * 30);
            } else {
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                gameState.currentSimilarity = Math.floor(60 + Math.random() * 38);
            }
            displaySimilarity(gameState.currentSimilarity);
            submitBtn.disabled = false;
            showToast(`MATCH: ${gameState.currentSimilarity}%`);
        }
        
        function displaySimilarity(percent) {
            similarityMeter.style.display = 'block';
            similarityFill.style.width = percent + '%';
            similarityText.textContent = percent + '%';
        }
        
        function submitMatch() {
            gameState.isSubmitted = true;
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            
            const reduction = Math.max(5, Math.floor((100 - gameState.currentSimilarity) / 4));
            gameState.energy = Math.max(0, gameState.energy - reduction);
            energyFill.style.width = gameState.energy + '%';
            energyPercent.textContent = gameState.energy + '%';
            
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'block';
            nextLevelBtn.textContent = gameState.currentLevel === 3 ? "🏆 COMPLETE! 🏆" : "▶ NEXT LEVEL";
        }
        
        function nextLevel() {
            if (gameState.timer <= 0 && !gameState.isSubmitted) {
                startLevel();
            } else if (gameState.currentLevel < 3) {
                gameState.currentLevel++;
                startLevel();
            } else {
                alert("Game Over! Thanks for playing.");
                location.reload();
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
