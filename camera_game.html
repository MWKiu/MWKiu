<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PIXEL MATCH AR! - LIBRARY MISSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'VT323', monospace;
            background: #e7e7d7;
            color: #444444;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .pixel-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(0deg, transparent 24%, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 0, 0, 0.05) 75%, rgba(0, 0, 0, 0.05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 0, 0, 0.05) 75%, rgba(0, 0, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 8px 8px;
            z-index: 10;
            pointer-events: none;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            padding: 20px 10px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .pixel-panel {
            background: #fdfcf3;
            border: 4px solid #87a7b7;
            border-style: outset;
            border-radius: 0;
            padding: 10px;
            margin-bottom: 12px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .energy-container {
            margin-bottom: 15px;
        }
        .energy-label {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 5px;
            color: #7a8f95;
            font-weight: bold;
        }
        .energy-bar-bg {
            width: 100%;
            height: 16px;
            background: #dcdcd3;
            border: 2px solid #a7a7a7;
            overflow: hidden;
        }
        .energy-fill {
            width: 80%;
            height: 100%;
            background: #b78777;
            transition: width 0.3s steps(5);
        }

        .location-header {
            text-align: center;
            background: #87a7b7;
            color: white;
            border-color: #577787;
        }
        .location-name {
            font-size: 28px;
            text-transform: uppercase;
        }
        .level-badge {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 3px;
        }

        .timer {
            font-size: 38px;
            font-weight: 700;
            color: #7a8f95;
            text-align: center;
            margin-bottom: 10px;
        }

        .section-title {
            color: #7a8f95;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            border-left: 5px solid #7a8f95;
            padding-left: 6px;
        }
        
        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #f0f0e3;
            border: 2px solid #a7a7a7;
            border-style: inset;
            overflow: hidden;
            position: relative;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #2a2a2a;
        }
        
        .camera-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            color: #87a7b7;
            font-size: 16px;
            text-align: center;
            z-index: 5;
        }
        
        .camera-placeholder.hidden {
            display: none;
        }

        .similarity-meter {
            margin-top: 8px;
            background: #f0f4f5;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #dcdcd3;
            border: 1px solid #a7a7a7;
            overflow: hidden;
            margin: 5px 0;
        }
        .meter-fill {
            height: 100%;
            transition: width 0.2s steps(4);
            width: 0%;
        }
        .meter-fill.high { background: #87a7b7; }
        .meter-fill.medium { background: #a7b7c7; }
        .meter-fill.low { background: #b7c7d7; }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            border: 4px solid #a7b7c7;
            border-style: outset;
            border-radius: 0;
            background: #a7b7c7;
            color: white;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .btn:active { border-style: inset; background: #87a7b7; color: #fdfcf3; transform: translate(1px, 1px); }
        .btn:disabled { background: #dcdcd3; border-color: #a7a7a7; color: #a7a7a7; cursor: not-allowed; opacity: 0.6; }

        .back-button {
            position: fixed;
            top: 15px;
            left: 10px;
            z-index: 100;
        }
        .back-button a {
            color: #7a8f95;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            background: #fdfcf3;
            padding: 4px 8px;
            border: 2px solid #87a7b7;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #444444;
            color: white;
            padding: 8px 16px;
            border: 2px solid #a7a7a7;
            border-style: outset;
            font-size: 18px;
            z-index: 1000;
            display: none;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .toast.show { display: block; animation: pixelFadeIn 0.3s ease; }

        .photo-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-actions .btn {
            margin-top: 0;
        }

        @keyframes pixelFadeIn {
            from { opacity: 0; bottom: 5px; }
            to { opacity: 1; bottom: 25px; }
        }
        
        .debug-status {
            font-size: 12px;
            color: #b78777;
            text-align: center;
            margin-top: 8px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="pixel-grid"></div>

    <div class="back-button"><a href="index.html">✕ EXIT</a></div>

    <div class="game-container">
        <div class="pixel-panel status-bar">
            <div class="level-info" style="color: #7a8f95;">LIBRARY AREA</div>
            <div class="timer" id="timer" style="margin-bottom: 0;">--:--</div>
        </div>

        <div class="energy-container">
            <div class="energy-label"><span>NEGATIVE ENERGY</span><span id="energyPercent">80%</span></div>
            <div class="energy-bar-bg"><div class="energy-fill" id="energyFill" style="width: 80%"></div></div>
        </div>

        <div class="pixel-panel location-header">
            <div class="location-name">LIBRARY SANCTUARY</div>
            <div class="level-badge" id="levelInfo">LEVEL 1/3 | TIME 5:00</div>
        </div>

        <div class="pixel-panel">
            <div class="section-title">TARGET IMAGE</div>
            <div class="image-container" id="targetContainer">
                <img id="targetImg" src="" alt="TARGET" style="display:none; width:100%; height:100%; object-fit:cover;">
                <div id="targetPlaceholder" style="display: flex; align-items: center; justify-content: center; width:100%; height:100%; color: #a7a7a7;">📖 LOADING...</div>
            </div>
        </div>

        <div class="pixel-panel similarity-meter" id="similarityMeter" style="display:none">
            <div style="font-size: 16px; color: #7a8f95; text-transform: uppercase;">MATCH ANALYSIS</div>
            <div class="meter-bar"><div class="meter-fill" id="similarityFill"></div></div>
            <div id="similarityText" style="text-align:right; font-size: 16px; font-weight: bold;">0%</div>
        </div>

        <div class="pixel-panel">
            <div class="section-title">YOUR CAMERA</div>
            <div class="image-container" style="position: relative;">
                <video id="video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; display: none;"></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div id="cameraPlaceholder" class="camera-placeholder">
                    <span>📷</span>
                    <span>WAITING FOR CAMERA...</span>
                    <span style="font-size: 12px;">Click ALLOW when prompted</span>
                </div>
            </div>
            <div class="photo-actions">
                <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>📸 TAKE PHOTO</button>
                <button class="btn" id="submitBtn" onclick="submitMatch()" disabled style="background: #b78777; border-color: #b78777;">⬆ SUBMIT</button>
            </div>
            <div id="cameraStatus" class="debug-status">⚡ CAMERA: INITIALIZING...</div>
        </div>

        <button class="btn" id="nextLevelBtn" onclick="nextLevel()" style="display:none; background: #444444; border-color: #444444; margin-bottom: 40px; color: #fdfcf3;">▶ NEXT LEVEL</button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // 使用可靠的圖片備援
        const FALLBACK_IMAGE = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2387a7b7'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='white' font-size='14'%3EBOOK%3C/text%3E%3C/svg%3E";
        
        const LEVEL_IMAGES = [
            "https://picsum.photos/id/20/400/300",
            "https://picsum.photos/id/24/400/300", 
            "https://picsum.photos/id/42/400/300"
        ];
        
        const LEVEL_TIMES = [300, 240, 180];
        
        let gameState = {
            currentLevel: 1,
            energy: 80,
            timer: 0,
            timerInterval: null,
            cameraActive: false,
            cameraStream: null,
            currentSimilarity: 0,
            isSubmitted: false,
            levelCompleted: false
        };

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const targetImg = document.getElementById('targetImg');
        const targetPlaceholder = document.getElementById('targetPlaceholder');
        const energyFill = document.getElementById('energyFill');
        const energyPercent = document.getElementById('energyPercent');
        const timerDisplay = document.getElementById('timer');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const submitBtn = document.getElementById('submitBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const similarityMeter = document.getElementById('similarityMeter');
        const similarityFill = document.getElementById('similarityFill');
        const similarityText = document.getElementById('similarityText');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');
        const cameraStatus = document.getElementById('cameraStatus');
        const levelInfo = document.getElementById('levelInfo');

        window.addEventListener('load', () => {
            showToast("PRESS ALLOW FOR CAMERA");
            startMatching();
        });
        
        async function startMatching() {
            await initCamera();
            // 相機初始化後再開始關卡
        }
        
        async function initCamera() {
            try {
                cameraStatus.textContent = "⚡ CAMERA: REQUESTING PERMISSION...";
                const constraints = { 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                };
                gameState.cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = gameState.cameraStream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                // 設定 canvas 尺寸
                setTimeout(() => {
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                }, 100);
                
                video.style.display = 'block';
                cameraPlaceholder.classList.add('hidden');
                gameState.cameraActive = true;
                takePhotoBtn.disabled = false;
                cameraStatus.textContent = "✅ CAMERA: ONLINE";
                cameraStatus.style.color = "#87a7b7";
                showToast("✅ CAMERA READY! TAKE A PHOTO");
                
                // 相機就緒後開始遊戲
                startLevel();
                
            } catch (error) {
                console.error("Camera error:", error);
                cameraStatus.textContent = "❌ CAMERA: DENIED - DEMO MODE";
                cameraStatus.style.color = "#b78777";
                cameraPlaceholder.innerHTML = "<span>📷</span><span>NO CAMERA ACCESS</span><span style='font-size:12px;'>DEMO MODE ACTIVE</span>";
                showToast("⚠️ CAMERA DENIED - USING DEMO MODE");
                gameState.cameraActive = false;
                takePhotoBtn.disabled = false; // Demo mode still works
                startLevel();
            }
        }
        
        function startLevel() {
            const idx = gameState.currentLevel - 1;
            const timeLimit = LEVEL_TIMES[idx];
            const targetUrl = LEVEL_IMAGES[idx];
            
            targetImg.src = targetUrl;
            targetImg.onload = () => {
                targetImg.style.display = 'block';
                targetPlaceholder.style.display = 'none';
            };
            targetImg.onerror = () => {
                targetImg.src = FALLBACK_IMAGE;
                targetImg.style.display = 'block';
                targetPlaceholder.style.display = 'none';
                showToast("⚠️ Using fallback target image");
            };
            
            levelInfo.textContent = `LEVEL ${gameState.currentLevel}/3 | TIME ${Math.floor(timeLimit/60)}:${(timeLimit%60).toString().padStart(2,'0')}`;
            
            gameState.isSubmitted = false;
            gameState.levelCompleted = false;
            gameState.currentSimilarity = 0;
            similarityMeter.style.display = 'none';
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'none';
            takePhotoBtn.disabled = !gameState.cameraActive;
            takePhotoBtn.textContent = "📸 TAKE PHOTO";
            
            startTimer(timeLimit);
            showToast(`LEVEL ${gameState.currentLevel} STARTED!`);
        }
        
        function startTimer(seconds) {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            gameState.timer = seconds;
            updateTimerDisplay();
            gameState.timerInterval = setInterval(() => {
                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    if (!gameState.isSubmitted && !gameState.levelCompleted) {
                        handleTimeout();
                    }
                } else {
                    gameState.timer--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(gameState.timer / 60);
            const secs = gameState.timer % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (gameState.timer <= 10) {
                timerDisplay.style.color = '#b78777';
            } else {
                timerDisplay.style.color = '#7a8f95';
            }
        }
        
        function handleTimeout() {
            showToast("⏰ TIME'S UP! PRESS RETRY");
            gameState.levelCompleted = true;
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'block';
            nextLevelBtn.textContent = "🔄 RETRY LEVEL";
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        }
        
        function takePhoto() {
            if (gameState.isSubmitted) {
                showToast("LEVEL ALREADY COMPLETED!");
                return;
            }
            
            if (!gameState.cameraActive) {
                // Demo mode
                const demoSim = Math.floor(60 + Math.random() * 35);
                gameState.currentSimilarity = demoSim;
                displaySimilarity(demoSim);
                submitBtn.disabled = false;
                takePhotoBtn.textContent = "📸 RETRY";
                showToast(`📸 DEMO PHOTO: ${demoSim}% MATCH`);
                return;
            }
            
            // Real camera mode
            const ctx = canvas.getContext('2d');
            if (canvas.width === 0 || canvas.height === 0) {
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 模擬相似度計算 (實際 AR 匹配模擬)
            const similarity = Math.floor(55 + Math.random() * 40);
            gameState.currentSimilarity = similarity;
            displaySimilarity(similarity);
            submitBtn.disabled = false;
            takePhotoBtn.textContent = "📸 RETRY";
            showToast(`📸 PHOTO ANALYZED: ${similarity}% MATCH`);
        }
        
        function displaySimilarity(percent) {
            similarityMeter.style.display = 'block';
            similarityFill.style.width = percent + '%';
            similarityText.textContent = percent + '%';
            
            if (percent >= 80) {
                similarityFill.className = 'meter-fill high';
            } else if (percent >= 60) {
                similarityFill.className = 'meter-fill medium';
            } else {
                similarityFill.className = 'meter-fill low';
            }
        }
        
        function submitMatch() {
            if (gameState.isSubmitted) {
                showToast("ALREADY SUBMITTED!");
                return;
            }
            
            if (gameState.currentSimilarity === 0) {
                showToast("TAKE A PHOTO FIRST!");
                return;
            }
            
            gameState.isSubmitted = true;
            gameState.levelCompleted = true;
            
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            
            // 計算能量消耗 (匹配度越高消耗越少)
            const reduction = Math.max(5, Math.min(25, Math.floor((100 - gameState.currentSimilarity) / 4)));
            gameState.energy = Math.max(0, gameState.energy - reduction);
            energyFill.style.width = gameState.energy + '%';
            energyPercent.textContent = Math.floor(gameState.energy) + '%';
            
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            
            showToast(`⚡ ENERGY -${reduction}% | MATCH: ${gameState.currentSimilarity}%`);
            
            if (gameState.currentLevel === 3) {
                showToast("🏆 LIBRARY SANCTUARY SAVED! 🏆");
                nextLevelBtn.style.display = 'block';
                nextLevelBtn.textContent = "🏆 COMPLETE! 🏆";
            } else {
                nextLevelBtn.style.display = 'block';
                nextLevelBtn.textContent = "▶ NEXT LEVEL";
            }
        }
        
        function nextLevel() {
            // Retry logic for timeout
            if (gameState.timer <= 0 && !gameState.isSubmitted) {
                gameState.currentLevel = gameState.currentLevel;
                startLevel();
                timerDisplay.style.color = '#7a8f95';
                return;
            }
            
            if (gameState.currentLevel < 3 && gameState.isSubmitted) {
                gameState.currentLevel++;
                startLevel();
            } else if (gameState.currentLevel === 3 && gameState.isSubmitted) {
                showToast("🎉 CONGRATULATIONS! YOU WIN! 🎉");
                setTimeout(() => {
                    if (confirm("Play again?")) {
                        gameState.currentLevel = 1;
                        gameState.energy = 80;
                        energyFill.style.width = '80%';
                        energyPercent.textContent = '80%';
                        startLevel();
                    }
                }, 500);
            } else if (!gameState.isSubmitted && gameState.timer > 0) {
                // Manual retry
                startLevel();
            } else {
                startLevel();
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        window.addEventListener('beforeunload', () => {
            if (gameState.cameraStream) {
                gameState.cameraStream.getTracks().forEach(track => track.stop());
            }
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        });
    </script>
</body>
</html>
