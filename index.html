<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PIXEL MATCH AR! - LIBRARY MISSION</title>
    <style>
        /* 1. Import Pixel Art Font */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 2. Pixelate rendering globally */
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'VT323', monospace; /* Use Pixel Font */
            background: #e7e7d7; /* Retro Beige */
            color: #444444; /* Dark Gray for text */
            font-size: 20px; /* Base font size for 8-bit feel */
            letter-spacing: 1px;
        }

        /* 3. Pixel Grid Texture Overlay */
        .pixel-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(0deg, transparent 24%, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 0, 0, 0.05) 75%, rgba(0, 0, 0, 0.05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 0, 0, 0.05) 75%, rgba(0, 0, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 8px 8px; /* Pixel grid size */
            z-index: 10;
            pointer-events: none;
        }

        /* 4. Disable modern wave animation */
        .energy-wave {
            display: none;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            padding: 20px 10px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        /* 5. Pixelated Panels */
        .pixel-panel {
            background: #fdfcf3;
            border: 4px solid #87a7b7; /* Pixelated Blue border */
            border-style: outset; /* Retro outset effect */
            border-radius: 0; /* Remove modern rounded corners */
            padding: 10px;
            margin-bottom: 12px;
            box-shadow: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .energy-container {
            margin-bottom: 15px;
        }
        .energy-label {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 5px;
            color: #7a8f95;
            font-weight: bold;
        }
        .energy-bar-bg {
            width: 100%;
            height: 16px;
            background: #dcdcd3;
            border: 2px solid #a7a7a7;
            overflow: hidden;
        }
        .energy-fill {
            width: 80%;
            height: 100%;
            /* Retro Earth tone for fill */
            background: #b78777; 
            transition: width 0.3s steps(5); /* Pixel-like stepping animation */
        }

        .location-header {
            text-align: center;
            background: #87a7b7; /* Retro Blue */
            color: white;
            border-color: #577787;
        }
        .location-name {
            font-size: 28px;
            text-transform: uppercase;
        }
        .level-badge {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 3px;
        }

        .timer {
            font-size: 38px;
            font-weight: 700;
            color: #7a8f95;
            text-align: center;
            margin-bottom: 10px;
        }

        .section-title {
            color: #7a8f95;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            border-left: 5px solid #7a8f95;
            padding-left: 6px;
        }
        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #f0f0e3;
            border: 2px solid #a7a7a7;
            border-style: inset;
            overflow: hidden;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Extra pixelation for dynamic content */
            image-rendering: -webkit-optimize-contrast; 
        }

        .similarity-meter {
            margin-top: 8px;
            background: #f0f4f5;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #dcdcd3;
            border: 1px solid #a7a7a7;
            overflow: hidden;
            margin: 5px 0;
        }
        .meter-fill {
            height: 100%;
            transition: width 0.2s steps(4);
        }
        .meter-fill.high { background: #87a7b7; }
        .meter-fill.medium { background: #a7b7c7; }
        .meter-fill.low { background: #b7c7d7; }

        /* 6. Retro Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            border: 4px solid #a7b7c7;
            border-style: outset;
            border-radius: 0;
            background: #a7b7c7;
            color: white;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .btn:active { border-style: inset; background: #87a7b7; color: #fdfcf3; }
        .btn:disabled { background: #dcdcd3; border-color: #a7a7a7; color: #a7a7a7; cursor: not-allowed; }

        .back-button {
            position: fixed;
            top: 15px;
            left: 10px;
            z-index: 100;
        }
        .back-button a {
            color: #7a8f95;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #444444; /* Retro gray toast */
            color: white;
            padding: 8px 16px;
            border: 2px solid #a7a7a7;
            border-style: outset;
            font-size: 18px;
            z-index: 1000;
            display: none;
            text-transform: uppercase;
        }
        .toast.show { display: block; animation: pixelFadeIn 0.3s ease; }

        @keyframes pixelFadeIn {
            from { opacity: 0; bottom: 5px; }
            to { opacity: 1; bottom: 25px; }
        }
    </style>
</head>
<body>
    <div class="pixel-grid"></div>

    <div class="back-button"><a href="index.html">✕ EXIT</a></div>

    <div class="game-container">
        <div class="pixel-panel status-bar">
            <div class="level-info" style="color: #7a8f95;">LIBRARY AREA</div>
            <div class="timer" id="timer" style="margin-bottom: 0;">--:--</div>
        </div>

        <div class="energy-container">
            <div class="energy-label"><span>NEGATIVE ENERGY SPENT</span><span id="energyPercent">80%</span></div>
            <div class="energy-bar-bg"><div class="energy-fill" id="energyFill" style="width: 80%"></div></div>
        </div>

        <div class="pixel-panel location-header">
            <div class="location-name">LIBRARY SANCTUARY</div>
            <div class="level-badge" id="levelInfo">LEVEL 1/3 | TIME 5:00</div>
        </div>

        <div class="pixel-panel area-card">
            <div class="section-title">TARGET IMAGE</div>
            <div class="image-container" id="targetContainer">
                <img id="targetImg" src="" alt="TARGET" style="display:none;">
                <div id="targetPlaceholder" style="text-align: center; padding-top: 25%; color: #a7a7a7;">LOADING...</div>
            </div>
        </div>

        <div class="pixel-panel similarity-meter" id="similarityMeter" style="display:none">
            <div style="font-size: 16px; color: #7a8f95; text-transform: uppercase;">MATCH ANALYSIS</div>
            <div class="meter-bar"><div class="meter-fill" id="similarityFill"></div></div>
            <div id="similarityText" style="text-align:right; font-size: 16px; font-weight: bold;">0%</div>
        </div>

        <div class="pixel-panel area-card">
            <div class="section-title">YOUR CAMERA</div>
            <div class="image-container">
                <video id="video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                <canvas id="canvas" style="display:none"></canvas>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>TAKE PHOTO</button>
                <button class="btn" id="submitBtn" onclick="submitMatch()" disabled style="background: #b78777; border-color: #b78777;">SUBMIT</button>
            </div>
        </div>

        <button class="btn" id="nextLevelBtn" onclick="nextLevel()" style="display:none; background: #444444; border-color: #444444; margin-bottom: 40px; color: #fdfcf3;">NEXT LEVEL</button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Keep core logic, update toast messages and UI interactions for Pixel style.
        const LEVEL_IMAGES = [
            "https://i.postimg.cc/bSN58DJF/IMG-9800.jpg",
            "https://i.postimg.cc/gnypGRN7/IMG-9792.jpg",
            "https://i.postimg.cc/T59t4RJW/IMG-9793.jpg"
        ];
        const LEVEL_TIMES = [300, 240, 180];
        
        let gameState = {
            currentLevel: 1,
            energy: 80,
            timer: 0,
            timerInterval: null,
            cameraActive: false,
            currentSimilarity: 0,
            isSubmitted: false
        };

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const targetImg = document.getElementById('targetImg');
        const energyFill = document.getElementById('energyFill');
        const timerDisplay = document.getElementById('timer');

        window.addEventListener('load', startMatching);

        async function startMatching() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                gameState.cameraActive = true;
                document.getElementById('takePhotoBtn').disabled = false;
                startLevel();
            } catch (err) {
                showToast("CAMERA PERMISSION DENIED");
            }
        }

        function startLevel() {
            const idx = gameState.currentLevel - 1;
            targetImg.src = LEVEL_IMAGES[idx];
            targetImg.style.display = 'block';
            document.getElementById('targetPlaceholder').style.display = 'none';
            document.getElementById('levelInfo').textContent = `LEVEL ${gameState.currentLevel}/3 | TIME ${LEVEL_TIMES[idx]/60}:00`;
            
            gameState.isSubmitted = false;
            document.getElementById('similarityMeter').style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('nextLevelBtn').style.display = 'none';
            
            startTimer(LEVEL_TIMES[idx]);
        }

        function startTimer(sec) {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            gameState.timer = sec;
            gameState.timerInterval = setInterval(() => {
                gameState.timer--;
                const m = Math.floor(gameState.timer / 60);
                const s = gameState.timer % 60;
                timerDisplay.textContent = `${m}:${s.toString().padStart(2,'0')}`;
                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    timerDisplay.style.color = '#b78777'; // Retro Red alert
                    showToast("TIME'S UP! TRY AGAIN");
                    document.getElementById('nextLevelBtn').style.display = 'block';
                    document.getElementById('nextLevelBtn').textContent = "RETRY LEVEL";
                }
            }, 1000);
        }

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const sim = Math.floor(65 + Math.random() * 32);
            gameState.currentSimilarity = sim;
            
            document.getElementById('similarityMeter').style.display = 'block';
            const fill = document.getElementById('similarityFill');
            fill.style.width = sim + '%';
            // Update steps colors for retro logic
            fill.className = 'meter-fill ' + (sim > 85 ? 'high' : sim > 60 ? 'medium' : 'low');
            document.getElementById('similarityText').textContent = sim + '%';
            document.getElementById('submitBtn').disabled = false;
            showToast(`MATCHING: ${sim}%`);
        }

        function submitMatch() {
            if (gameState.isSubmitted) return;
            gameState.isSubmitted = true;
            clearInterval(gameState.timerInterval);
            
            const reduce = (gameState.currentSimilarity / 15);
            gameState.energy = Math.max(0, gameState.energy - reduce);
            energyFill.style.width = gameState.energy + '%';
            document.getElementById('energyPercent').textContent = Math.floor(gameState.energy) + '%';
            
            showToast("DATA SUBMITTED!");
            document.getElementById('nextLevelBtn').style.display = 'block';
            if (gameState.currentLevel === 3) {
                document.getElementById('nextLevelBtn').textContent = "ALL LEVELS COMPLETE!";
                showToast("🏆 LIBRARY SAVED!");
            } else {
                 document.getElementById('nextLevelBtn').textContent = "NEXT LEVEL";
            }
        }

        function nextLevel() {
            // Retry logic
            if(gameState.timer <= 0 || document.getElementById('nextLevelBtn').textContent == "RETRY LEVEL") {
                 startLevel();
                 document.getElementById('timer').style.color = '#7a8f95';
                 return;
            }

            if (gameState.currentLevel < 3) {
                gameState.currentLevel++;
                startLevel();
            } else {
                showToast("VICTORY! YOU SAVED THE LIBRARY!");
                setTimeout(() => location.href = 'index.html', 2500);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
